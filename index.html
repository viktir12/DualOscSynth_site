<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthzer Preset Cloud</title>
    <!-- Подключаем Bootstrap для стилей -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Подключаем Supabase JS (ОДИН РАЗ) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; }
        .navbar { background-color: #212529; }
        .hero-section { background: #fff; border-bottom: 1px solid #dee2e6; padding: 40px 0; margin-bottom: 30px; }
        .preset-xml-view { font-family: monospace; font-size: 0.85rem; background: #f8f9fa; }
    </style>
</head>
<body>

<!-- Навигация -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Synthzer Preset Cloud</a>
    </div>
</nav>

<!-- Главный экран -->
<section class="hero-section text-center">
    <div class="container">
        <h1 class="display-5 fw-bold">Virtual Analog Synthesizer</h1>
        <p class="lead text-muted mt-3">Платформа для хранения и обмена пресетами синтезатора</p>
    <a href="DualOscSynth.zip" class="btn btn-primary btn-lg mt-3" download>Скачать DualOscSynth.zip</a>
    </div>
</section>

<!-- Раздел с пресетами -->
<section class="container mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Библиотека пресетов</h2>
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addModal">+ Добавить пресет</button>
    </div>

    <!-- Фильтры -->
    <div class="card mb-3">
        <div class="card-body">
            <div class="row">
                <div class="col-md-8">
                    <input type="text" id="searchInput" class="form-control" placeholder="Поиск по названию или автору...">
                </div>
                <div class="col-md-4">
                    <select id="categorySelect" class="form-select">
                        <option value="">Все категории</option>
                        <option value="Bass">Bass</option>
                        <option value="Lead">Lead</option>
                        <option value="Pad">Pad</option>
                        <option value="Pluck">Pluck</option>
                        <option value="FX">FX</option>
                        <option value="General">General</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Таблица -->
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr><th>Название</th><th>Автор</th><th>Категория</th><th>Дата</th><th class="text-end">Действия</th></tr>
                </thead>
                <tbody id="presetsTable">
                    <tr><td colspan="5" class="text-center py-4 text-muted">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</section>

<!-- Модальное окно: Добавление -->
<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <form id="presetForm">
                <div class="modal-header">
                    <h5 class="modal-title">Новый пресет</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Название *</label>
                        <input type="text" id="pName" class="form-control" required>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Автор</label>
                            <input type="text" id="pAuthor" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Категория</label>
                            <select id="pCategory" class="form-select">
                                <option value="General">General</option>
                                <option value="Bass">Bass</option>
                                <option value="Lead">Lead</option>
                                <option value="Pad">Pad</option>
                                <option value="Pluck">Pluck</option>
                                <option value="FX">FX</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">XML файл</label>
                        <input type="file" id="pFile" class="form-control" accept=".xml">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Или XML код</label>
                        <textarea id="pXml" class="form-control preset-xml-view" rows="6"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Модальное окно: Просмотр -->
<div class="modal fade" id="viewModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="viewTitle">Просмотр</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-2 text-muted small">
                    Автор: <span id="viewAuthor"></span> | Категория: <span id="viewCategory"></span>
                </div>
                <textarea id="viewXml" class="form-control preset-xml-view" rows="8" readonly></textarea>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" onclick="copyXml()">Копировать</button>
                <button type="button" class="btn btn-primary" id="dlBtn">Скачать</button>
                <button type="button" class="btn btn-danger" id="delBtn">Удалить</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ==========================================
    // ИНИЦИАЛИЗАЦИЯ SUPABASE (СТРОГО ОДИН РАЗ)
    // ==========================================
    const SUPABASE_URL = 'https://uofunrnmwkddijrosqaq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvZnVucm5td2tkZGlqcm9zcWFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0OTI2MDAsImV4cCI6MjA5NjA2ODYwMH0.FkDwlrshjvq6MF9v67xO1cxtSWRXorrPg45iDt8Z0tI';
    
    // Создаем клиент
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentId = null;

    // ==========================================
    // ФУНКЦИИ
    // ==========================================

    async function loadPresets() {
        const tbody = document.getElementById('presetsTable');
        const search = document.getElementById('searchInput').value.trim();
        const category = document.getElementById('categorySelect').value;
        
        tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4">Загрузка...</td></tr>';
        
        let query = supabase.from('presets').select('*');
        if (search) query = query.or(`name.ilike.%${search}%,author.ilike.%${search}%`);
        if (category) query = query.eq('category', category);
        query = query.order('created_at', { ascending: false });
        
        const { data, error } = await query;
        
        if (error) {
            console.error('Ошибка Supabase:', error);
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">Ошибка загрузки данных</td></tr>';
            return;
        }
        
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">Пресеты не найдены</td></tr>';
            return;
        }
        
        tbody.innerHTML = data.map(p => {
            const date = new Date(p.created_at).toLocaleDateString('ru-RU');
            return `<tr>
                <td class="fw-medium">${escapeHtml(p.name)}</td>
                <td>${escapeHtml(p.author || '-')}</td>
                <td><span class="badge bg-secondary">${p.category}</span></td>
                <td class="text-muted small">${date}</td>
                <td class="text-end">
                    <button class="btn btn-sm btn-outline-primary" onclick="view('${p.id}', ${JSON.stringify(p).replace(/"/g, '&quot;')})">Просмотр</button>
                    <button class="btn btn-sm btn-outline-danger ms-1" onclick="del('${p.id}')">Удалить</button>
                </td>
            </tr>`;
        }).join('');
    }

    document.getElementById('presetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('pName').value;
        const author = document.getElementById('pAuthor').value;
        const category = document.getElementById('pCategory').value;
        const fileInput = document.getElementById('pFile');
        const xmlText = document.getElementById('pXml').value;
        
        let filename = null;
        let presetXml = xmlText;
        
        // Если есть файл, грузим в Storage
        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            filename = crypto.randomUUID() + '.xml';
            
            const { error: uploadError } = await supabase.storage.from('presets').upload(filename, file);
            if (uploadError) {
                alert('Ошибка загрузки файла: ' + uploadError.message);
                return;
            }
            presetXml = await file.text();
        } else if (!presetXml.trim()) {
            alert('Загрузите файл или введите XML код');
            return;
        }
        
        // Сохраняем в БД
        const { error } = await supabase.from('presets').insert({
            name, author, category, preset_xml: presetXml, filename
        });
        
        if (error) {
            alert('Ошибка сохранения: ' + error.message);
        } else {
            bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
            document.getElementById('presetForm').reset();
            loadPresets();
            alert('Пресет сохранен!');
        }
    });

    function view(id, preset) {
        currentId = id;
        document.getElementById('viewTitle').textContent = preset.name;
        document.getElementById('viewAuthor').textContent = preset.author || '-';
        document.getElementById('viewCategory').textContent = preset.category;
        document.getElementById('viewXml').value = preset.preset_xml || '';
        
        document.getElementById('dlBtn').onclick = () => download(preset);
        document.getElementById('delBtn').onclick = () => del(id);
        
        new bootstrap.Modal(document.getElementById('viewModal')).show();
    }

    async function download(preset) {
        if (preset.filename) {
            const { data } = supabase.storage.from('presets').getPublicUrl(preset.filename);
            const a = document.createElement('a');
            a.href = data.publicUrl;
            a.download = preset.name + '.xml';
            a.click();
        } else {
            const blob = new Blob([preset.preset_xml], { type: 'application/xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = preset.name + '.xml';
            a.click();
            URL.revokeObjectURL(url);
        }
    }

    async function del(id) {
        if (!confirm('Удалить пресет?')) return;
        
        const { data } = await supabase.from('presets').select('filename').eq('id', id).single();
        if (data && data.filename) {
            await supabase.storage.from('presets').remove([data.filename]);
        }
        
        const { error } = await supabase.from('presets').delete().eq('id', id);
        if (error) {
            alert('Ошибка: ' + error.message);
        } else {
            bootstrap.Modal.getInstance(document.getElementById('viewModal')).hide();
            loadPresets();
        }
    }

    function copyXml() {
        const ta = document.getElementById('viewXml');
        ta.select();
        document.execCommand('copy');
        alert('XML скопирован!');
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    document.getElementById('pFile').addEventListener('change', async function(e) {
        if (e.target.files[0]) {
            document.getElementById('pXml').value = await e.target.files[0].text();
        }
    });

    let timeout;
    document.getElementById('searchInput').addEventListener('input', () => {
        clearTimeout(timeout);
        timeout = setTimeout(loadPresets, 500);
    });

    document.getElementById('categorySelect').addEventListener('change', loadPresets);

    // Запуск при старте
    loadPresets();
</script>
</body>
</html>
